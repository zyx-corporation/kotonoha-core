name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kotonoha
          POSTGRES_PASSWORD: kotonoha
          POSTGRES_DB: kotonoha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kotonoha -d kotonoha_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Passed to `--include-ignored` integration tests (`src/store/postgres.rs`).
      DATABASE_URL: postgres://kotonoha:kotonoha@localhost:5432/kotonoha_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo test (library, default features)
        run: cargo test --verbose
      - name: cargo test (--features postgres, DB + ignored integration)
        run: cargo test --features postgres --verbose -- --include-ignored
