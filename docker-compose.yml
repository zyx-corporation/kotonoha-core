# Local PostgreSQL for Kotonoha development (not for production as-is).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kotonoha
      POSTGRES_PASSWORD: kotonoha
      POSTGRES_DB: kotonoha_dev
    ports:
      - "5432:5432"
    volumes:
      - kotonoha_pg_data:/var/lib/postgresql/data

volumes:
  kotonoha_pg_data:
