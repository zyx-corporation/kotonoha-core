<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="980" viewBox="0 0 1120 980" role="img" aria-labelledby="title desc">
  <title id="title">Full RDE Structure Concept</title>
  <desc id="desc">Layered conceptual architecture for a full RDE implementation, from input handling to semantic extraction, Delta M analysis, RDE classification, governance handoff, and lineage/audit integration.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .panel { fill: #ffffff; stroke: #d8dee8; stroke-width: 1.5; rx: 18; }
      .layer-title { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2933; }
      .layer-sub { font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #5f6b7a; }
      .node { fill: #f7fafc; stroke: #9fb3c8; stroke-width: 1.2; rx: 12; }
      .node-strong { fill: #eef6ff; stroke: #2f5f8f; stroke-width: 1.6; rx: 12; }
      .node-warn { fill: #fff7ed; stroke: #c47f2f; stroke-width: 1.4; rx: 12; }
      .text { font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2933; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
      .arrow { stroke: #52616f; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #8a98a8; stroke-width: 1.3; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 6 5; }
      .boundary { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 8 6; fill: none; rx: 18; }
      .footer { font: 500 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #5f6b7a; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52616f"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a98a8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="980"/>

  <text x="560" y="42" text-anchor="middle" class="layer-title">Full RDE Structure Concept</text>
  <text x="560" y="66" text-anchor="middle" class="layer-sub">RDE is a semantic-change audit structure, not a model wrapper or final authority.</text>

  <!-- Input layer -->
  <rect class="panel" x="70" y="95" width="980" height="115"/>
  <text x="95" y="128" class="layer-title">1. Input Layer</text>
  <text x="95" y="150" class="layer-sub">Normalize what is being reviewed; do not collapse the subject into raw text diff alone.</text>
  <rect class="node" x="95" y="165" width="210" height="34"/>
  <text x="200" y="187" text-anchor="middle" class="text">Subject Adapter</text>
  <rect class="node" x="330" y="165" width="210" height="34"/>
  <text x="435" y="187" text-anchor="middle" class="text">Context Assembler</text>
  <rect class="node" x="565" y="165" width="230" height="34"/>
  <text x="680" y="187" text-anchor="middle" class="text">Source-of-truth Resolver</text>
  <rect class="node-strong" x="820" y="165" width="205" height="34"/>
  <text x="922" y="187" text-anchor="middle" class="text">RdeContextBundle</text>

  <!-- Semantic layer -->
  <rect class="panel" x="70" y="245" width="980" height="135"/>
  <text x="95" y="278" class="layer-title">2. Semantic Layer</text>
  <text x="95" y="300" class="layer-sub">Extract meaning-bearing elements such as intent, constraint, risk, responsibility, and unresolved questions.</text>
  <rect class="node" x="95" y="318" width="210" height="34"/>
  <text x="200" y="340" text-anchor="middle" class="text">Semantic Extractor</text>
  <rect class="node" x="330" y="318" width="240" height="34"/>
  <text x="450" y="340" text-anchor="middle" class="text">Claim / Intent Parser</text>
  <rect class="node" x="595" y="318" width="220" height="34"/>
  <text x="705" y="340" text-anchor="middle" class="text">Responsibility Detector</text>
  <rect class="node" x="840" y="318" width="185" height="34"/>
  <text x="932" y="340" text-anchor="middle" class="text">Unresolvedness</text>

  <rect class="node-strong" x="360" y="356" width="400" height="34"/>
  <text x="560" y="378" text-anchor="middle" class="text">SemanticExtraction / SemanticElement[]</text>

  <!-- Delta M layer -->
  <rect class="panel" x="70" y="415" width="980" height="135"/>
  <text x="95" y="448" class="layer-title">3. ΔM Layer</text>
  <text x="95" y="470" class="layer-sub">Compare prior and changed semantic states; show how meaning moved, not merely what text changed.</text>
  <rect class="node" x="95" y="488" width="230" height="34"/>
  <text x="210" y="510" text-anchor="middle" class="text">Element Matcher</text>
  <rect class="node" x="350" y="488" width="240" height="34"/>
  <text x="470" y="510" text-anchor="middle" class="text">Transformation Analyzer</text>
  <rect class="node-warn" x="615" y="488" width="190" height="34"/>
  <text x="710" y="510" text-anchor="middle" class="text">Loss Detector</text>
  <rect class="node-warn" x="830" y="488" width="195" height="34"/>
  <text x="928" y="510" text-anchor="middle" class="text">Drift Risk Detector</text>

  <rect class="node-strong" x="390" y="526" width="340" height="34"/>
  <text x="560" y="548" text-anchor="middle" class="text">DeltaMReport / DeltaMRelation[]</text>

  <!-- RDE layer -->
  <rect class="panel" x="70" y="585" width="980" height="135"/>
  <text x="95" y="618" class="layer-title">4. RDE Layer</text>
  <text x="95" y="640" class="layer-sub">Map ΔM relations into SLS-4 categories and bind observations to evidence and uncertainty.</text>
  <rect class="node" x="95" y="658" width="215" height="34"/>
  <text x="202" y="680" text-anchor="middle" class="text">Category Classifier</text>
  <rect class="node-strong" x="335" y="658" width="190" height="34"/>
  <text x="430" y="680" text-anchor="middle" class="text">Evidence Binder</text>
  <rect class="node" x="550" y="658" width="250" height="34"/>
  <text x="675" y="680" text-anchor="middle" class="text">Confidence / Uncertainty</text>
  <rect class="node" x="825" y="658" width="200" height="34"/>
  <text x="925" y="680" text-anchor="middle" class="text">Next Update Policy</text>

  <rect class="node-strong" x="380" y="696" width="360" height="34"/>
  <text x="560" y="718" text-anchor="middle" class="text">RdeEvaluation / SLS-4 Output</text>

  <!-- Governance layer -->
  <rect class="panel" x="70" y="755" width="980" height="135"/>
  <text x="95" y="788" class="layer-title">5. Governance Layer</text>
  <text x="95" y="810" class="layer-sub">Hand off observations to humans and systems without turning RDE into approval or enforcement.</text>
  <rect class="node-strong" x="95" y="828" width="220" height="34"/>
  <text x="205" y="850" text-anchor="middle" class="text">Human Review Handoff</text>
  <rect class="node" x="340" y="828" width="190" height="34"/>
  <text x="435" y="850" text-anchor="middle" class="text">Audit Correlation</text>
  <rect class="node" x="555" y="828" width="220" height="34"/>
  <text x="665" y="850" text-anchor="middle" class="text">Lineage Store Integration</text>
  <rect class="node-warn" x="800" y="828" width="225" height="34"/>
  <text x="912" y="850" text-anchor="middle" class="text">Meta-RDE Quality Review</text>

  <!-- arrows between layers -->
  <path class="arrow" d="M 560 210 L 560 245"/>
  <path class="arrow" d="M 560 380 L 560 415"/>
  <path class="arrow" d="M 560 550 L 560 585"/>
  <path class="arrow" d="M 560 720 L 560 755"/>

  <!-- outer governance boundary -->
  <rect class="boundary" x="45" y="80" width="1030" height="830"/>
  <text x="70" y="930" class="footer">Boundary: RDE emits traceable semantic observations. Approval, rejection, safety enforcement, and access control remain outside RDE.</text>

  <!-- side notes -->
  <path class="arrow-soft" d="M 922 199 C 1010 225 1010 625 925 658"/>
  <text x="982" y="410" class="small" transform="rotate(90 982,410)">context and evidence flow forward</text>
</svg>
